# ─── tcm.my.id — Nginx reverse-proxy config ──────────────────────────────────
#
# Architecture:
#   Client → Nginx (80/443)
#     ├─ /api/email/*  → Next.js :3000  (Next.js API route handler)
#     ├─ /api/*        → Fastify  :3001  (backend)
#     └─ /*            → Next.js :3000  (frontend pages)
#
# Fix 4 rationale:
#   /api/email/send is served by src/app/api/email/send/route.ts in Next.js.
#   Without the explicit exception below, a catch-all /api/ → :3001 block
#   would proxy it to Fastify and return 404.
# ─────────────────────────────────────────────────────────────────────────────

upstream nextjs  { server 127.0.0.1:3000; }
upstream fastify { server 127.0.0.1:3001; }

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tcm.my.id www.tcm.my.id;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tcm.my.id www.tcm.my.id;

    ssl_certificate     /etc/letsencrypt/live/tcm.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tcm.my.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 20M;

    # ── Proxy helper snippets ───────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_read_timeout  60s;
    proxy_connect_timeout 10s;

    # ── FIX 4: /api/email/* → Next.js (NOT Fastify) ────────────────────────
    # Must appear BEFORE the generic /api/ block because nginx uses
    # longest-prefix matching for location blocks.
    location ^~ /api/email/ {
        proxy_pass http://nextjs;
    }

    # ── Backend API → Fastify :3001 ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://fastify;
    }

    # ── Everything else → Next.js :3000 ────────────────────────────────────
    location / {
        proxy_pass http://nextjs;

        # Support Next.js HMR in development (remove in prod if not needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets cache ─────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/tcm.access.log;
    error_log  /var/log/nginx/tcm.error.log;
}
